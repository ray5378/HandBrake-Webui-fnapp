name: Build fpk for Main Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-fpk-main:
    runs-on: ubuntu-latest
    name: Build fpk (with Docker Image) for Main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version (timestamp)
        id: version
        run: |
          # 使用日期 + git short sha 作为版本
          VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building fpk version: $VERSION"

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && VITE_GIT_COMMIT=${GITHUB_SHA::7} npm run build

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: ray5378/handbrake-webui-fnapp:latest,ray5378/handbrake-webui-fnapp:${{ steps.version.outputs.version }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Export Docker image
        run: |
          mkdir -p fpk/docker
          docker save ray5378/handbrake-webui-fnapp:latest | gzip > fpk/docker/image.tar.gz
          ls -lh fpk/docker/

      - name: Install fnpack
        run: |
          wget -q https://developer.fnnas.com/static/fnpack-1.0.1-linux-amd64 -O /usr/local/bin/fnpack
          chmod +x /usr/local/bin/fnpack
          fnpack --version

      - name: Update manifest version
        run: |
          sed -i "s/^version[[:space:]]*=.*/version               = ${{ steps.version.outputs.version }}/" fpk/manifest
          cat fpk/manifest

      - name: Build fpk package
        run: |
          cd fpk
          fnpack build .
          ls -lh *.fpk

      - name: Move build artifacts to dist
        run: |
          mkdir -p dist
          mv fpk/*.fpk dist/App.ThirdParty.HandBrakeWebui-${{ steps.version.outputs.version }}.fpk
          cd dist
          sha256sum App.ThirdParty.HandBrakeWebui-${{ steps.version.outputs.version }}.fpk > App.ThirdParty.HandBrakeWebui-${{ steps.version.outputs.version }}.fpk.sha256
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fpk-main-build
          path: |
            dist/
          retention-days: 7

      - name: Delete old pre-release
        uses: dev-drprasad/delete-tag-and-release@v1
        with:
          tag_name: main-latest
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Main Branch Pre-release
          prerelease: true
          files: |
            dist/App.ThirdParty.HandBrakeWebui-${{ steps.version.outputs.version }}.fpk
            dist/App.ThirdParty.HandBrakeWebui-${{ steps.version.outputs.version }}.fpk.sha256
            docker-compose.yml
            .env.example
          body: |
            这是 main 分支的最新自动构建版本。
            This is an auto-built pre-release from the main branch.
            Built from commit: ${{ github.sha }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
