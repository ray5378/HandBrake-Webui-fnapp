name: Build fpk Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build fpk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd src/frontend && npm ci

      - name: Build frontend
        run: |
          cd src/frontend && VITE_GIT_COMMIT=${GITHUB_SHA::7} npm run build

      - name: Install backend dependencies
        run: |
          cd src/backend && npm ci --ignore-scripts

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/docker/Dockerfile
          tags: ray5378/handbrake-webui-fnapp:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Package app.tgz
        run: |
          mkdir -p fpk/app && tar -czf fpk/app.tgz -C fpk/app .

      - name: Build fpk
        run: |
          VERSION=$(grep '^version' fpk/manifest | awk -F'=' '{print $2}' | xargs)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          FPK_NAME="App.ThirdParty.HandBrakeWebui-${VERSION}.fpk"
          echo "Building ${FPK_NAME}"
          tar -czf "${FPK_NAME}" \
            --transform 's|^fpk/||' \
            fpk/app.tgz \
            fpk/manifest \
            fpk/ICON.PNG \
            fpk/ICON_256.PNG \
            fpk/cmd/main \
            fpk/cmd/install_init \
            fpk/cmd/install_callback \
            fpk/cmd/uninstall_init \
            fpk/cmd/uninstall_callback \
            fpk/cmd/upgrade_init \
            fpk/cmd/upgrade_callback \
            fpk/cmd/config_init \
            fpk/cmd/config_callback \
            fpk/config/privilege \
            fpk/config/resource \
            fpk/wizard/install \
            fpk/wizard/config \
            fpk/wizard/uninstall

      - name: Verify fpk contents
        run: |
          ls -lh App.ThirdParty.HandBrakeWebui-*.fpk
          tar -tzf App.ThirdParty.HandBrakeWebui-*.fpk

      - name: Generate checksum
        run: |
          sha256sum "App.ThirdParty.HandBrakeWebui-${VERSION}.fpk" | tee "App.ThirdParty.HandBrakeWebui-${VERSION}.fpk.sha256"

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: handbrake-webui-fpk
          path: |
            App.ThirdParty.HandBrakeWebui-*.fpk
            App.ThirdParty.HandBrakeWebui-*.fpk.sha256

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            App.ThirdParty.HandBrakeWebui-*.fpk
            App.ThirdParty.HandBrakeWebui-*.fpk.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
